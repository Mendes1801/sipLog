version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sip_postgres
    environment:
      POSTGRES_DB: sip_db
      POSTGRES_USER: sip_user
      POSTGRES_PASSWORD: sip_password
    ports:
      - "5432:5432"
    restart: unless-stopped
    volumes:
      - ./volume/postgres:/var/lib/postgresql/data

  # Mantive o Redis ATIVADO pois o BFF e a Core API (Spring) 
  # geralmente precisam dele para cache ou sessões
  redis:
    image: redis:7-alpine
    container_name: sip_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # Core API (Rodando na porta 8081 conforme você pediu)
  core-api:
    build:
      context: ../core_api/apiCore-sipLog
      dockerfile: Dockerfile
    container_name: siplog-core-api
    ports:
      - "8081:8081"
    depends_on:
      - postgres
      - redis
    environment:
      - JAVA_OPTS=-Xmx512m -Xms256m 
      # Apontando exatamente para as credenciais criadas no container do Postgres
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/sip_db
      - SPRING_DATASOURCE_USERNAME=sip_user
      - SPRING_DATASOURCE_PASSWORD=sip_password

  # BFF (Rodando na porta 8080)
  bff:
    build:
      context: ../sipLog-BFF
      dockerfile: Dockerfile
    container_name: siplog-bff
    ports:
      - "8080:8080" # Porta que o Flutter vai chamar
    depends_on:
      - core-api
      - redis
    environment:
      - JAVA_OPTS=-Xmx512m -Xms256m 
      # O BFF aponta para a porta 8081 da Core API
      - CORE_API_URL=http://core-api:8081