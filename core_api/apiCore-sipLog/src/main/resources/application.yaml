server:
  port: 8081

spring:
  application:
    name: apiCore-sipLog
 
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8082/realms/BFF
          
  datasource:
    url: jdbc:postgresql://localhost:5432/sip_db
    username: sip_user
    password: sip_password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true # Muito útil para ver as queries rodando no console durante o desenvolvimento